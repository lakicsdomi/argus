name: Argus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    permissions:
      contents: write # Needed for coverage badge updates
    name: Validation Pipeline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26

    - name: Download dependencies
      run: make deps

    # Run golangci-lint linter Github Action.
    # If this ever stops due to version mismatches or other issues, the fallback Docker linter will catch it.
    # Or just check their GitHub Action page for updates:
    # https://github.com/golangci/golangci-lint-action
    - name: Run Linter
      uses: golangci/golangci-lint-action@v9
      # with latest version.

    - name: Run Unit Tests with Coverage (Native)
      run: make test

    - name: Extract Coverage
      run: make coverage-summary

    - name: Create Coverage Badge
      uses: tj-actions/coverage-badge-go@v2
      if: env.ACT != 'true' # Skip badge generation in local ACT runs to prevent dirty git commits
      with:
        filename: coverage.out
        generate_summary_report: true
        badge: true
        output: coverage.svg

    - name: Commit Coverage Badge
      if: env.ACT != 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs: update coverage badge"
        file_pattern: coverage.svg

    # For local ACT testing, to prevent leftover containers.
    - name: Cleanup Docker
      if: always()
      run: make docker-down