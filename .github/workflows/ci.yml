name: Argus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validation Pipeline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26

    - name: Download dependencies
      run: make deps

    # By using a Dockerized linter, we ensure a deterministic environment
    # avoiding Go version mismatches between GitHub Actions, local ACT, and the golangci-lint binary.
    - name: Run Linter (Dockerized)
      run: make docker-lint

    - name: Run Unit Tests with Coverage (Native)
      run: make test

    - name: Extract Coverage
      run: make coverage-summary

    - name: Create Coverage Badge
      uses: tj-actions/coverage-badge-go@v2
      if: env.ACT != 'true' # Skip badge generation in local ACT runs to prevent dirty git commits
      with:
        filename: coverage.out
        badge: true

    # For local ACT testing, to prevent leftover containers.
    - name: Cleanup Docker
      if: always()
      run: make docker-down